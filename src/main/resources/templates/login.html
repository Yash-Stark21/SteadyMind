<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — SteadyMind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="text-center mb-4">
                <h1 class="display-6 steadyai-header text-primary"><i class="bi bi-shield-check me-2"></i>SteadyMind</h1>
                <p class="text-muted">Welcome back. Please log in to continue.</p>
            </div>
            
            <div class="card steadyai-card shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/login}" method="post">
                        <div th:if="${param.error}" class="alert alert-danger py-2 px-3 small">
                            Invalid username or password.
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success py-2 px-3 small">
                            You have been logged out.
                        </div>
                        
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Username</label>
                            <input type="text" id="username" name="username" class="form-control" placeholder="user" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <input type="password" id="password" name="password" class="form-control" placeholder="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="bi bi-box-arrow-in-right me-1"></i> Log In
                        </button>
                        <div class="text-center small">
                            <span class="text-muted">Don't have an account?</span> 
                            <a th:href="@{/register}" class="text-primary text-decoration-none fw-semibold">Create one</a>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="text-center mt-4">
                <a th:href="@{/}" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left me-1"></i>Back to Home</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
