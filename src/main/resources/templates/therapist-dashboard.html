<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Assigned Users - SteadyMind</title>
    <meta name="description" content="Therapist view for assigned SteadyMind users">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="mb-4">
        <h1 class="display-6 fw-bold text-primary">Assigned Users</h1>
        <p class="text-muted">Read-only access to users assigned by an administrator.</p>
    </div>

    <div class="card steadyai-card">
        <div class="card-header bg-light fw-semibold">
            <i class="bi bi-people me-2"></i>Users
        </div>
        <div th:if="${#lists.isEmpty(patients)}" class="card-body empty-state">
            <i class="bi bi-person-check"></i>
            <p class="mb-0">No users are assigned to you yet.</p>
        </div>

        <div th:if="${!#lists.isEmpty(patients)}" class="table-responsive">
            <table class="table steadyai-table align-middle mb-0">
                <thead>
                <tr>
                    <th>User</th>
                    <th>Email</th>
                    <th class="text-center">Logs</th>
                    <th class="text-center">Challenges</th>
                    <th class="text-center">Delays</th>
                    <th class="text-center">AI Chats</th>
                    <th class="text-end">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="patient : ${patients}">
                    <td class="fw-semibold" th:text="${patient.name}">User Name</td>
                    <td class="text-muted" th:text="${patient.email}">user@example.com</td>
                    <td class="text-center" th:text="${patient.totalUrgeLogs}">0</td>
                    <td class="text-center">
                        <span th:text="${patient.completedExposureTasks}">0</span>
                        <span class="text-muted">/</span>
                        <span th:text="${patient.totalExposureTasks}">0</span>
                    </td>
                    <td class="text-center" th:text="${patient.totalDelayAttempts}">0</td>
                    <td class="text-center" th:text="${patient.totalAiConversations}">0</td>
                    <td class="text-end">
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/therapist/patients/{id}(id=${patient.patientId})}">
                            <i class="bi bi-eye me-1"></i>View
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
