<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weekly AI Summary — SteadyMind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="mb-4">
        <h1 class="display-6 fw-bold text-primary">Weekly Reflection Summary</h1>
        <p class="text-muted" id="date-range-text">Loading dates...</p>
    </div>

    <!-- Loading Spinner -->
    <div id="loading-spinner" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading summary...</span>
        </div>
        <p class="mt-3 text-muted">Generating your personalized weekly summary...</p>
    </div>

    <!-- Summary Content (Hidden until loaded) -->
    <div id="summary-content" class="d-none">
        
        <!-- Metrics Row -->
        <div class="row g-4 mb-4">
            <div class="col-md-6 col-lg-3">
                <div class="card steadyai-card h-100 text-center">
                    <div class="card-body">
                        <div class="text-info mb-2"><i class="bi bi-journal-check fs-2"></i></div>
                        <h6 class="card-title text-muted">Total Logs</h6>
                        <p class="display-6 fw-bold" id="total-logs">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="card steadyai-card h-100 text-center">
                    <div class="card-body">
                        <div class="text-warning mb-2"><i class="bi bi-graph-up fs-2"></i></div>
                        <h6 class="card-title text-muted">Avg Intensity</h6>
                        <p class="display-6 fw-bold" id="avg-intensity">0.0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="card steadyai-card h-100 text-center">
                    <div class="card-body">
                        <div class="text-danger mb-2"><i class="bi bi-exclamation-triangle fs-2"></i></div>
                        <h6 class="card-title text-muted">Common Trigger</h6>
                        <p class="fs-5 fw-bold text-truncate" id="common-trigger">-</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="card steadyai-card h-100 text-center">
                    <div class="card-body">
                        <div class="text-secondary mb-2"><i class="bi bi-clock-history fs-2"></i></div>
                        <h6 class="card-title text-muted">Risk Period</h6>
                        <p class="fs-5 fw-bold" id="risk-period">-</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- AI Insights -->
        <div class="card steadyai-card mb-4 border-0 shadow-sm">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-3"><i class="bi bi-robot text-primary me-2"></i>AI Coach Insights</h5>
                
                <div class="mb-4">
                    <h6 class="fw-bold text-secondary">Progress Observations</h6>
                    <p id="progress-observations" class="text-muted"></p>
                </div>
                
                <div class="mb-4">
                    <h6 class="fw-bold text-secondary">Recurring Patterns</h6>
                    <p id="recurring-patterns" class="text-muted"></p>
                </div>

                <div>
                    <h6 class="fw-bold text-secondary">Suggested Next Steps</h6>
                    <p id="suggested-steps" class="text-muted mb-0"></p>
                </div>
            </div>
        </div>

        <!-- Safety Note -->
        <div class="alert alert-light border shadow-sm text-center" role="alert">
            <i class="bi bi-shield-exclamation text-warning me-2"></i>
            <small id="safety-note" class="text-muted fw-semibold"></small>
        </div>
        
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        window.steadyApiFetch('/api/ai/weekly-summary')
            .then(response => response.json())
            .then(data => {
                // Hide spinner, show content
                document.getElementById('loading-spinner').classList.add('d-none');
                document.getElementById('summary-content').classList.remove('d-none');
                
                // Populate data
                document.getElementById('date-range-text').innerText = data.startDate + ' to ' + data.endDate;
                document.getElementById('total-logs').innerText = data.totalUrgeLogs;
                document.getElementById('avg-intensity').innerText = data.averageIntensity;
                document.getElementById('common-trigger').innerText = data.mostCommonTrigger;
                document.getElementById('common-trigger').title = data.mostCommonTrigger;
                document.getElementById('risk-period').innerText = data.highestRiskPeriod;
                
                document.getElementById('progress-observations').innerText = data.progressObservations;
                document.getElementById('recurring-patterns').innerText = data.recurringPatterns;
                document.getElementById('suggested-steps').innerText = data.suggestedNextSteps;
                document.getElementById('safety-note').innerText = data.safetyNote;
            })
            .catch(error => {
                console.error('Error fetching weekly summary:', error);
                document.getElementById('loading-spinner').innerHTML = 
                    '<p class="text-danger"><i class="bi bi-x-circle me-2"></i>Failed to load summary. Please try again later.</p>';
            });
    });
</script>
</body>
</html>
