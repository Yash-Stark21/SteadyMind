<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="View your growth challenges - SteadyMind">
    <title>Growth Challenges — SteadyMind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 fw-bold"><i class="bi bi-lightning-charge me-2 text-warning"></i>Growth Challenges</h1>
        <a th:href="@{/exposures/new}" class="btn btn-primary"><i class="bi bi-plus-circle me-1"></i> New Challenge</a>
    </div>
    <div th:if="${#lists.isEmpty(tasks)}" class="text-center py-5">
        <i class="bi bi-lightning display-1 text-muted"></i>
        <p class="text-muted mt-3 fs-5">No challenges yet. Create your first growth challenge!</p>
        <a th:href="@{/exposures/new}" class="btn btn-primary mt-2"><i class="bi bi-plus-circle me-1"></i> Create First Challenge</a>
    </div>
    <div th:if="${!#lists.isEmpty(tasks)}" class="row g-3">
        <div class="col-md-6 col-lg-4" th:each="task : ${tasks}">
            <div class="card steadyai-card h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title fw-bold mb-0" th:text="${task.title}">Title</h5>
                        <span class="badge" th:text="${task.status}"
                              th:classappend="${task.status.name() == 'COMPLETED' ? 'bg-success' : (task.status.name() == 'IN_PROGRESS' ? 'bg-primary' : (task.status.name() == 'SKIPPED' ? 'bg-secondary' : 'bg-warning text-dark'))}">Status</span>
                    </div>
                    <p class="card-text text-muted" th:if="${task.description}" th:text="${task.description}">Desc</p>
                    <div class="mt-2"><small><i class="bi bi-speedometer2 me-1"></i>Level: <span th:text="${task.difficultyLevel}">—</span></small></div>
                    <div th:if="${task.targetDate}" class="mt-1"><small class="text-muted"><i class="bi bi-calendar-event me-1"></i>Target: <span th:text="${#temporals.format(task.targetDate, 'MMM dd, yyyy')}">—</span></small></div>
                    <div th:if="${task.completedAt}" class="mt-1"><small class="text-success"><i class="bi bi-check2-circle me-1"></i>Done: <span th:text="${#temporals.format(task.completedAt, 'MMM dd, yyyy')}">—</span></small></div>
                    <div class="mt-1"><small class="text-muted"><i class="bi bi-clock me-1"></i>Created: <span th:text="${#temporals.format(task.createdAt, 'MMM dd, yyyy')}">—</span></small></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
