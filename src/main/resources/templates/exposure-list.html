<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="View your growth challenges - SteadyMind">
    <title>Growth Challenges — SteadyMind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 fw-bold"><i class="bi bi-lightning-charge me-2 text-warning"></i>Growth Challenges</h1>
        <a th:href="@{/exposures/new}" class="btn btn-primary"><i class="bi bi-plus-circle me-1"></i> New Challenge</a>
    </div>
    <div th:if="${#lists.isEmpty(tasks)}" class="text-center py-5">
        <i class="bi bi-lightning display-1 text-muted"></i>
        <p class="text-muted mt-3 fs-5">No challenges yet. Create your first growth challenge!</p>
        <a th:href="@{/exposures/new}" class="btn btn-primary mt-2"><i class="bi bi-plus-circle me-1"></i> Create First Challenge</a>
    </div>
    <div th:if="${!#lists.isEmpty(tasks)}" class="row g-3">
        <div class="col-md-6 col-lg-4" th:each="task : ${tasks}">
            <div class="card steadyai-card h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title fw-bold mb-0" th:text="${task.title}">Title</h5>
                        <div>
                            <span class="badge" th:text="${task.status}"
                                  th:classappend="${task.status.name() == 'COMPLETED' ? 'bg-success' : (task.status.name() == 'IN_PROGRESS' ? 'bg-primary' : (task.status.name() == 'SKIPPED' ? 'bg-secondary' : 'bg-warning text-dark'))}">Status</span>
                            <div class="dropdown d-inline-block ms-1">
                                <button class="btn btn-sm btn-link text-muted p-0" type="button" data-bs-toggle="dropdown">
                                    <i class="bi bi-three-dots-vertical"></i>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                                    <li><a class="dropdown-item" href="#" th:onclick="|viewTask(${task.id}); return false;|"><i class="bi bi-eye me-2"></i> View Details</a></li>
                                    <li><a class="dropdown-item" href="#" th:onclick="|editTask(${task.id}); return false;|"><i class="bi bi-pencil me-2"></i> Edit</a></li>
                                    <li><hr class="dropdown-divider"></li>
                                    <li><a class="dropdown-item text-danger" href="#" th:onclick="|deleteTask(${task.id}); return false;|"><i class="bi bi-trash me-2"></i> Delete</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <p class="card-text text-muted" th:if="${task.description}" th:text="${task.description}">Desc</p>
                    <div class="mt-2"><small><i class="bi bi-speedometer2 me-1"></i>Level: <span th:text="${task.difficultyLevel}">—</span></small></div>
                    <div th:if="${task.targetDate}" class="mt-1"><small class="text-muted"><i class="bi bi-calendar-event me-1"></i>Target: <span th:text="${#temporals.format(task.targetDate, 'MMM dd, yyyy')}">—</span></small></div>
                    <div th:if="${task.completedAt}" class="mt-1"><small class="text-success"><i class="bi bi-check2-circle me-1"></i>Done: <span th:text="${#temporals.format(task.completedAt, 'MMM dd, yyyy')}">—</span></small></div>
                    <div class="mt-1"><small class="text-muted"><i class="bi bi-clock me-1"></i>Created: <span th:text="${#temporals.format(task.createdAt, 'MMM dd, yyyy')}">—</span></small></div>

                    <!-- Action Buttons for status transitions -->
                    <div th:if="${task.status.name() == 'PENDING'}" class="task-actions mt-3 pt-3 border-top">
                        <div class="d-flex gap-2">
                            <button class="btn btn-primary btn-sm flex-grow-1"
                                    th:onclick="|updateTaskStatus(${task.id}, 'start')|"
                                    title="Start this challenge">
                                <i class="bi bi-play-fill me-1"></i> Start
                            </button>
                            <button class="btn btn-outline-secondary btn-sm"
                                    th:onclick="|skipTask(${task.id})|"
                                    title="Skip this challenge">
                                <i class="bi bi-skip-forward-fill me-1"></i> Skip
                            </button>
                        </div>
                    </div>
                    <div th:if="${task.status.name() == 'IN_PROGRESS'}" class="task-actions mt-3 pt-3 border-top">
                        <div class="d-flex gap-2">
                            <button class="btn btn-success btn-sm flex-grow-1"
                                    th:onclick="|updateTaskStatus(${task.id}, 'complete')|"
                                    title="Mark as completed">
                                <i class="bi bi-check-lg me-1"></i> Complete
                            </button>
                            <button class="btn btn-outline-secondary btn-sm"
                                    th:onclick="|skipTask(${task.id})|"
                                    title="Skip this challenge">
                                <i class="bi bi-skip-forward-fill me-1"></i> Skip
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Toast notification for status updates -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="statusToast" class="toast align-items-center text-bg-success border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="statusToastBody">Status updated successfully!</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<!-- View Task Modal -->
<div class="modal fade" id="viewTaskModal" tabindex="-1" aria-labelledby="viewTaskModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content" style="border-radius: 16px; border: none;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" id="viewTaskModalLabel"><i class="bi bi-lightning-charge me-2 text-warning"></i>Challenge Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body pt-2">
                <div class="mb-3">
                    <label class="form-label fw-bold mb-1">Title</label>
                    <p id="viewTaskTitle" class="mb-0 text-muted">—</p>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold mb-1">Description</label>
                    <p id="viewTaskDesc" class="mb-0 text-muted">—</p>
                </div>
                <div class="row mb-3">
                    <div class="col-6">
                        <label class="form-label fw-bold mb-1">Difficulty</label>
                        <p id="viewTaskDiff" class="mb-0 text-muted">—</p>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold mb-1">Status</label>
                        <p id="viewTaskStatus" class="mb-0">—</p>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-6">
                        <label class="form-label fw-bold mb-1">Target Date</label>
                        <p id="viewTaskTarget" class="mb-0 text-muted">—</p>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold mb-1">Completed Date</label>
                        <p id="viewTaskCompleted" class="mb-0 text-muted">—</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Task Modal -->
<div class="modal fade" id="editTaskModal" tabindex="-1" aria-labelledby="editTaskModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content" style="border-radius: 16px; border: none;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" id="editTaskModalLabel"><i class="bi bi-pencil me-2 text-primary"></i>Edit Challenge</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body pt-2">
                <form id="editTaskForm">
                    <input type="hidden" id="editTaskId">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Title</label>
                        <input type="text" class="form-control" id="editTaskTitle" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea class="form-control" id="editTaskDesc" rows="3"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-semibold">Difficulty Level</label>
                            <select class="form-select" id="editTaskDiff" required>
                                <option value="EASY">Easy</option>
                                <option value="MEDIUM">Medium</option>
                                <option value="HARD">Hard</option>
                            </select>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-semibold">Target Date</label>
                            <input type="datetime-local" class="form-control" id="editTaskTarget">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="updateTask()" id="updateTaskBtn">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    /**
     * Update exposure task status via REST API.
     * @param {number} id - The task ID
     * @param {string} action - One of: 'start', 'complete', 'skip'
     */
    async function updateTaskStatus(id, action) {
        try {
            const response = await fetch('/api/exposure-tasks/' + id + '/' + action, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' }
            });

            if (!response.ok) {
                const errorData = await response.text();
                throw new Error(errorData || 'Failed to update task status');
            }

            // Show success toast briefly, then reload
            showToast(getSuccessMessage(action));
            setTimeout(() => window.location.reload(), 800);
        } catch (error) {
            console.error('Error updating task:', error);
            alert('Could not update task: ' + error.message);
        }
    }

    /**
     * Skip task with confirmation dialog.
     */
    function skipTask(id) {
        if (confirm('Are you sure you want to skip this challenge? You can always create a new one later.')) {
            updateTaskStatus(id, 'skip');
        }
    }

    function getSuccessMessage(action) {
        switch (action) {
            case 'start': return '🚀 Challenge started! You\'ve got this.';
            case 'complete': return '🎉 Challenge completed! Amazing work!';
            case 'skip': return 'Challenge skipped. No worries — focus on what matters.';
            default: return 'Status updated!';
        }
    }

    function showToast(message) {
        const toastBody = document.getElementById('statusToastBody');
        toastBody.textContent = message;
        const toast = new bootstrap.Toast(document.getElementById('statusToast'), { delay: 2000 });
        toast.show();
    }

    async function viewTask(id) {
        try {
            const res = await fetch('/api/exposure-tasks/' + id);
            if (!res.ok) throw new Error('Failed to fetch');
            const data = await res.json();
            document.getElementById('viewTaskTitle').textContent = data.title || '—';
            document.getElementById('viewTaskDesc').textContent = data.description || '—';
            document.getElementById('viewTaskDiff').textContent = data.difficultyLevel || '—';
            document.getElementById('viewTaskStatus').textContent = data.status || '—';
            document.getElementById('viewTaskTarget').textContent = data.targetDate ? new Date(data.targetDate).toLocaleString() : '—';
            document.getElementById('viewTaskCompleted').textContent = data.completedAt ? new Date(data.completedAt).toLocaleString() : '—';
            new bootstrap.Modal(document.getElementById('viewTaskModal')).show();
        } catch (e) {
            alert('Error loading task details: ' + e.message);
        }
    }

    async function editTask(id) {
        try {
            const res = await fetch('/api/exposure-tasks/' + id);
            if (!res.ok) throw new Error('Failed to fetch');
            const data = await res.json();
            document.getElementById('editTaskId').value = data.id;
            document.getElementById('editTaskTitle').value = data.title || '';
            document.getElementById('editTaskDesc').value = data.description || '';
            document.getElementById('editTaskDiff').value = data.difficultyLevel || 'EASY';
            if (data.targetDate) {
                document.getElementById('editTaskTarget').value = data.targetDate.slice(0, 16);
            } else {
                document.getElementById('editTaskTarget').value = '';
            }
            new bootstrap.Modal(document.getElementById('editTaskModal')).show();
        } catch (e) {
            alert('Error loading task for edit: ' + e.message);
        }
    }

    async function updateTask() {
        const btn = document.getElementById('updateTaskBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Saving...';
        const id = document.getElementById('editTaskId').value;
        const targetVal = document.getElementById('editTaskTarget').value;
        const payload = {
            title: document.getElementById('editTaskTitle').value,
            description: document.getElementById('editTaskDesc').value,
            difficultyLevel: document.getElementById('editTaskDiff').value,
            targetDate: targetVal ? targetVal : null
        };
        try {
            const res = await fetch('/api/exposure-tasks/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error('Failed to update');
            window.location.reload();
        } catch (e) {
            alert('Error updating task: ' + e.message);
            btn.disabled = false;
            btn.innerHTML = 'Save Changes';
        }
    }

    async function deleteTask(id) {
        if (!confirm('Are you sure you want to delete this challenge?')) return;
        try {
            const res = await fetch('/api/exposure-tasks/' + id, { method: 'DELETE' });
            if (!res.ok) throw new Error('Failed to delete');
            window.location.reload();
        } catch (e) {
            alert('Error deleting task: ' + e.message);
        }
    }
</script>
</body>
</html>
