<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SteadyAI Base Project</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <h1 class="display-4 steadyai-header mb-4">SteadyAI</h1>
            <div class="card steadyai-card">
                <div class="card-body">
                    <h2 class="h4" th:text="${message}">Message Placeholder</h2>
                    <p class="text-muted mt-3">Day 1 base project setup is complete.</p>
                    <hr>
                    <div class="d-flex justify-content-around text-start mt-4">
                        <div>
                            <strong>Stack Configured:</strong>
                            <ul class="list-unstyled">
                                <li>✅ Java 25</li>
                                <li>✅ Spring Boot 4.x</li>
                                <li>✅ Spring MVC</li>
                                <li>✅ Thymeleaf & Bootstrap</li>
                            </ul>
                        </div>
                        <div>
                            <strong>Dependencies Present:</strong>
                            <ul class="list-unstyled">
                                <li>✅ Spring Security</li>
                                <li>✅ Spring Data JPA</li>
                                <li>✅ MySQL Driver</li>
                                <li>✅ Spring AI</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
