<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="View your moment logs - SteadyMind">
    <title>Moment Logs — SteadyMind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 fw-bold"><i class="bi bi-journal-text me-2 text-primary"></i>Moment Logs</h1>
        <a th:href="@{/urge-logs/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i> Log a Moment
        </a>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(logs)}" class="text-center py-5">
        <i class="bi bi-journal-plus display-1 text-muted"></i>
        <p class="text-muted mt-3 fs-5">No moment logs yet. Start by recording your first one!</p>
        <a th:href="@{/urge-logs/new}" class="btn btn-primary mt-2">
            <i class="bi bi-plus-circle me-1"></i> Log Your First Moment
        </a>
    </div>

    <!-- Logs table -->
    <div th:if="${!#lists.isEmpty(logs)}" class="table-responsive">
        <table class="table table-hover align-middle steadyai-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Trigger</th>
                    <th>Urge to Act</th>
                    <th>Intensity Before</th>
                    <th>Intensity After</th>
                    <th>Delay (min)</th>
                    <th>Acted?</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="log : ${logs}">
                    <td>
                        <small th:text="${#temporals.format(log.createdAt, 'MMM dd, yyyy HH:mm')}" class="text-muted">—</small>
                    </td>
                    <td>
                        <span th:text="${#strings.abbreviate(log.triggerText, 40)}">—</span>
                    </td>
                    <td>
                        <span th:text="${#strings.abbreviate(log.compulsionUrge, 30)}">—</span>
                    </td>
                    <td>
                        <span class="badge bg-warning text-dark" th:text="${log.intensityBefore}">—</span>
                    </td>
                    <td>
                        <span class="badge" th:text="${log.intensityAfter != null ? log.intensityAfter : '—'}"
                              th:classappend="${log.intensityAfter != null && log.intensityAfter < log.intensityBefore} ? 'bg-success' : 'bg-secondary'">
                            —
                        </span>
                    </td>
                    <td th:text="${log.delayMinutes}">—</td>
                    <td>
                        <span th:if="${log.compulsionPerformed}" class="badge bg-danger">Yes</span>
                        <span th:unless="${log.compulsionPerformed}" class="badge bg-success">No ✓</span>
                    </td>
                    <td>
                        <div class="d-flex gap-1">
                            <button class="btn btn-sm btn-outline-info" th:onclick="|viewLog(${log.id})|" title="View Details">
                                <i class="bi bi-eye"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-primary" th:onclick="|editLog(${log.id})|" title="Edit">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" th:onclick="|deleteLog(${log.id})|" title="Delete">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<!-- View Modal -->
<div class="modal fade" id="viewModal" tabindex="-1" aria-labelledby="viewModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content" style="border-radius: 16px; border: none;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" id="viewModalLabel"><i class="bi bi-journal-text me-2 text-primary"></i>Log Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body pt-2">
                <div class="mb-3">
                    <label class="form-label fw-bold mb-1">Trigger</label>
                    <p id="viewTrigger" class="mb-0 text-muted">—</p>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold mb-1">Obsession Text</label>
                    <p id="viewObsession" class="mb-0 text-muted">—</p>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold mb-1">Compulsion Urge</label>
                    <p id="viewCompulsion" class="mb-0 text-muted">—</p>
                </div>
                <div class="row mb-3">
                    <div class="col-6">
                        <label class="form-label fw-bold mb-1">Intensity Before</label>
                        <p id="viewIntensityBefore" class="mb-0 text-muted">—</p>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold mb-1">Intensity After</label>
                        <p id="viewIntensityAfter" class="mb-0 text-muted">—</p>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-6">
                        <label class="form-label fw-bold mb-1">Delay Minutes</label>
                        <p id="viewDelay" class="mb-0 text-muted">—</p>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold mb-1">Acted on Urge?</label>
                        <p id="viewActed" class="mb-0">—</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content" style="border-radius: 16px; border: none;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" id="editModalLabel"><i class="bi bi-pencil me-2 text-primary"></i>Edit Moment Log</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body pt-2">
                <form id="editForm">
                    <input type="hidden" id="editId">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Trigger</label>
                        <textarea class="form-control" id="editTrigger" rows="2" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Obsession Text</label>
                        <textarea class="form-control" id="editObsession" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Compulsion Urge</label>
                        <textarea class="form-control" id="editCompulsion" rows="2" required></textarea>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-semibold">Intensity Before (1-10)</label>
                            <input type="number" class="form-control" id="editIntensityBefore" min="1" max="10" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-semibold">Intensity After (1-10)</label>
                            <input type="number" class="form-control" id="editIntensityAfter" min="1" max="10">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-semibold">Delay Minutes</label>
                            <select class="form-select" id="editDelay" required>
                                <option value="0">0</option>
                                <option value="2">2</option>
                                <option value="5">5</option>
                                <option value="10">10</option>
                                <option value="15">15</option>
                            </select>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-semibold">Acted on Urge?</label>
                            <select class="form-select" id="editActed" required>
                                <option value="true">Yes</option>
                                <option value="false">No</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="updateLog()" id="updateLogBtn">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function viewLog(id) {
        try {
            const res = await window.steadyApiFetch('/api/urge-logs/' + id);
            if (!res.ok) throw new Error('Failed to fetch');
            const data = await res.json();
            document.getElementById('viewTrigger').textContent = data.triggerText || '—';
            document.getElementById('viewObsession').textContent = data.obsessionText || '—';
            document.getElementById('viewCompulsion').textContent = data.compulsionUrge || '—';
            document.getElementById('viewIntensityBefore').textContent = data.intensityBefore || '—';
            document.getElementById('viewIntensityAfter').textContent = data.intensityAfter || '—';
            document.getElementById('viewDelay').textContent = data.delayMinutes;
            document.getElementById('viewActed').innerHTML = data.compulsionPerformed ? '<span class="badge bg-danger">Yes</span>' : '<span class="badge bg-success">No ✓</span>';
            new bootstrap.Modal(document.getElementById('viewModal')).show();
        } catch (e) {
            alert('Error loading log details: ' + e.message);
        }
    }

    async function editLog(id) {
        try {
            const res = await window.steadyApiFetch('/api/urge-logs/' + id);
            if (!res.ok) throw new Error('Failed to fetch');
            const data = await res.json();
            document.getElementById('editId').value = data.id;
            document.getElementById('editTrigger').value = data.triggerText || '';
            document.getElementById('editObsession').value = data.obsessionText || '';
            document.getElementById('editCompulsion').value = data.compulsionUrge || '';
            document.getElementById('editIntensityBefore').value = data.intensityBefore || '';
            document.getElementById('editIntensityAfter').value = data.intensityAfter || '';
            document.getElementById('editDelay').value = data.delayMinutes;
            document.getElementById('editActed').value = data.compulsionPerformed ? 'true' : 'false';
            new bootstrap.Modal(document.getElementById('editModal')).show();
        } catch (e) {
            alert('Error loading log for edit: ' + e.message);
        }
    }

    async function updateLog() {
        const btn = document.getElementById('updateLogBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Saving...';
        const id = document.getElementById('editId').value;
        const payload = {
            triggerText: document.getElementById('editTrigger').value,
            obsessionText: document.getElementById('editObsession').value,
            compulsionUrge: document.getElementById('editCompulsion').value,
            intensityBefore: parseInt(document.getElementById('editIntensityBefore').value),
            intensityAfter: document.getElementById('editIntensityAfter').value ? parseInt(document.getElementById('editIntensityAfter').value) : null,
            delayMinutes: parseInt(document.getElementById('editDelay').value),
            compulsionPerformed: document.getElementById('editActed').value === 'true'
        };
        try {
            const res = await window.steadyApiFetch('/api/urge-logs/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error('Failed to update');
            window.location.reload();
        } catch (e) {
            alert('Error updating log: ' + e.message);
            btn.disabled = false;
            btn.innerHTML = 'Save Changes';
        }
    }

    async function deleteLog(id) {
        if (!confirm('Are you sure you want to delete this moment log?')) return;
        try {
            const res = await window.steadyApiFetch('/api/urge-logs/' + id, { method: 'DELETE' });
            if (!res.ok) throw new Error('Failed to delete');
            window.location.reload();
        } catch (e) {
            alert('Error deleting log: ' + e.message);
        }
    }
</script>
</body>
</html>
