<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SteadyAI Personal Progress Report</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #333;
            line-height: 1.6;
            margin: 40px auto;
            max-width: 800px;
            padding: 0 20px;
        }
        h1, h2, h3 {
            color: #2c3e50;
        }
        h1 {
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .meta-info {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 30px;
            font-size: 0.95em;
        }
        .metrics-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: #fff;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            padding: 20px;
            flex: 1;
            min-width: 200px;
            text-align: center;
        }
        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: #3498db;
            margin: 10px 0;
        }
        .metric-label {
            color: #7f8c8d;
            font-size: 0.9em;
            text-transform: uppercase;
        }
        .section {
            margin-bottom: 30px;
        }
        .safety-note {
            background-color: #fdf2f2;
            border-left: 4px solid #e74c3c;
            padding: 15px;
            margin-top: 40px;
            font-style: italic;
            color: #c0392b;
        }
        ul {
            padding-left: 20px;
        }
        li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <h1>SteadyAI Personal Progress Report</h1>

    <div class="meta-info">
        <p><strong>Prepared for:</strong> <span th:text="${report.userDisplayName}"></span></p>
        <p><strong>Date Range:</strong> <span th:text="${report.startDate}"></span> to <span th:text="${report.endDate}"></span></p>
        <p><strong>Generated on:</strong> <span th:text="${report.generatedAt}"></span></p>
    </div>

    <div class="metrics-grid">
        <div class="metric-card">
            <div class="metric-label">Total Urges Logged</div>
            <div class="metric-value" th:text="${report.totalUrgeLogs}">0</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Avg. Urge Intensity</div>
            <div class="metric-value" th:text="${report.averageUrgeIntensity}">0.0</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Exposures Completed</div>
            <div class="metric-value" th:text="${report.completedExposureTasks}">0</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Delays Completed</div>
            <div class="metric-value" th:text="${report.completedDelayAttempts}">0</div>
        </div>
    </div>

    <div class="section">
        <h2>Weekly Summary</h2>
        <p th:text="${report.weeklySummary}"></p>
    </div>

    <div class="section" th:if="${!report.keyObservations.isEmpty()}">
        <h2>Key Observations</h2>
        <ul>
            <li th:each="obs : ${report.keyObservations}" th:text="${obs}"></li>
        </ul>
        <p th:if="${report.mostCommonTrigger != 'N/A'}">
            <strong>Most Common Trigger:</strong> <span th:text="${report.mostCommonTrigger}"></span>
        </p>
    </div>

    <div class="section" th:if="${!report.suggestedNextSteps.isEmpty()}">
        <h2>Suggested Next Steps</h2>
        <ul>
            <li th:each="step : ${report.suggestedNextSteps}" th:text="${step}"></li>
        </ul>
    </div>

    <div class="safety-note">
        <strong>Important:</strong> <span th:text="${report.safetyNote}"></span>
    </div>

</body>
</html>
