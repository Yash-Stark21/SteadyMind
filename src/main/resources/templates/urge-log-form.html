<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Log a moment - SteadyMind">
    <title>Log a Moment — SteadyMind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <h1 class="h3 fw-bold mb-4">
                <i class="bi bi-pencil-square me-2 text-primary"></i>Log a Moment
            </h1>

            <div class="card steadyai-card">
                <div class="card-body p-4">

                    <form th:action="@{/urge-logs}" th:object="${urgeLogRequest}" method="post" novalidate>

                        <!-- Trigger Text -->
                        <div class="mb-3">
                            <label for="triggerText" class="form-label fw-semibold">What triggered this moment?</label>
                            <textarea class="form-control" id="triggerText" th:field="*{triggerText}"
                                      rows="2" maxlength="500"
                                      placeholder="Describe what you were doing or feeling..."
                                      th:classappend="${#fields.hasErrors('triggerText')} ? 'is-invalid' : ''"></textarea>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('triggerText')}" th:errors="*{triggerText}">Error</div>
                        </div>

                        <!-- Obsession Text (Recurring Thought) -->
                        <div class="mb-3">
                            <label for="obsessionText" class="form-label fw-semibold">Recurring thought <span class="text-muted fw-normal">(optional)</span></label>
                            <textarea class="form-control" id="obsessionText" th:field="*{obsessionText}"
                                      rows="2" maxlength="500"
                                      placeholder="Any persistent thought on your mind..."
                                      th:classappend="${#fields.hasErrors('obsessionText')} ? 'is-invalid' : ''"></textarea>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('obsessionText')}" th:errors="*{obsessionText}">Error</div>
                        </div>

                        <!-- Compulsion Urge (Urge to Act) -->
                        <div class="mb-3">
                            <label for="compulsionUrge" class="form-label fw-semibold">Urge to act</label>
                            <textarea class="form-control" id="compulsionUrge" th:field="*{compulsionUrge}"
                                      rows="2" maxlength="300"
                                      placeholder="What did you feel the urge to do?"
                                      th:classappend="${#fields.hasErrors('compulsionUrge')} ? 'is-invalid' : ''"></textarea>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('compulsionUrge')}" th:errors="*{compulsionUrge}">Error</div>
                        </div>

                        <div class="row">
                            <!-- Intensity Before -->
                            <div class="col-md-6 mb-3">
                                <label for="intensityBefore" class="form-label fw-semibold">Intensity before (1–10)</label>
                                <input type="number" class="form-control" id="intensityBefore"
                                       th:field="*{intensityBefore}" min="1" max="10"
                                       placeholder="1–10"
                                       th:classappend="${#fields.hasErrors('intensityBefore')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('intensityBefore')}" th:errors="*{intensityBefore}">Error</div>
                            </div>

                            <!-- Intensity After -->
                            <div class="col-md-6 mb-3">
                                <label for="intensityAfter" class="form-label fw-semibold">Intensity after (1–10) <span class="text-muted fw-normal">(optional)</span></label>
                                <input type="number" class="form-control" id="intensityAfter"
                                       th:field="*{intensityAfter}" min="1" max="10"
                                       placeholder="1–10"
                                       th:classappend="${#fields.hasErrors('intensityAfter')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('intensityAfter')}" th:errors="*{intensityAfter}">Error</div>
                            </div>
                        </div>

                        <!-- Delay Minutes -->
                        <div class="mb-3">
                            <label for="delayMinutes" class="form-label fw-semibold">How long did you wait? (minutes)</label>
                            <select class="form-select" id="delayMinutes" th:field="*{delayMinutes}"
                                    th:classappend="${#fields.hasErrors('delayMinutes') || #fields.hasErrors('validDelayMinutes')} ? 'is-invalid' : ''">
                                <option value="">Choose...</option>
                                <option value="0">0 min — Acted immediately</option>
                                <option value="2">2 min</option>
                                <option value="5">5 min</option>
                                <option value="10">10 min</option>
                                <option value="15">15 min</option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('delayMinutes')}" th:errors="*{delayMinutes}">Error</div>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('validDelayMinutes')}" th:errors="*{validDelayMinutes}">Error</div>
                        </div>

                        <!-- Compulsion Performed (Did you act on it?) -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Did you act on the urge?</label>
                            <div class="d-flex gap-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{compulsionPerformed}"
                                           id="actedYes" value="true">
                                    <label class="form-check-label" for="actedYes">Yes</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{compulsionPerformed}"
                                           id="actedNo" value="false">
                                    <label class="form-check-label" for="actedNo">No</label>
                                </div>
                            </div>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('compulsionPerformed')}" th:errors="*{compulsionPerformed}">Error</div>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex justify-content-between">
                            <a th:href="@{/urge-logs}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i> Save Moment Log
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
