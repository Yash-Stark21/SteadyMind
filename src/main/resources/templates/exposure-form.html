<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>New Challenge — SteadyMind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <h1 class="h3 fw-bold mb-4"><i class="bi bi-lightning-charge me-2 text-warning"></i>Create a Growth Challenge</h1>
            <div class="card steadyai-card">
                <div class="card-body p-4">
                    <form th:action="@{/exposures}" th:object="${exposureTaskRequest}" method="post" novalidate>
                        <div class="mb-3">
                            <label for="title" class="form-label fw-semibold">Challenge Title</label>
                            <input type="text" class="form-control" id="title" th:field="*{title}" placeholder="e.g. Practice a grounding exercise"
                                   th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Error</div>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label fw-semibold">Description <span class="text-muted fw-normal">(optional)</span></label>
                            <textarea class="form-control" id="description" th:field="*{description}" rows="3" placeholder="What does this challenge involve?"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="difficultyLevel" class="form-label fw-semibold">Challenge Level</label>
                            <select class="form-select" id="difficultyLevel" th:field="*{difficultyLevel}"
                                    th:classappend="${#fields.hasErrors('difficultyLevel')} ? 'is-invalid' : ''">
                                <option value="">Choose a level...</option>
                                <option th:each="level : ${difficultyLevels}" th:value="${level}" th:text="${level}">LEVEL</option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('difficultyLevel')}" th:errors="*{difficultyLevel}">Error</div>
                        </div>
                        <div class="mb-4">
                            <label for="targetDate" class="form-label fw-semibold">Target Date <span class="text-muted fw-normal">(optional)</span></label>
                            <input type="datetime-local" class="form-control" id="targetDate" th:field="*{targetDate}">
                        </div>
                        <div class="d-flex justify-content-between">
                            <a th:href="@{/exposures}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i> Save Challenge</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
