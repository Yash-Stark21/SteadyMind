<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Account — SteadyMind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="text-center mb-4">
                <h1 class="display-6 steadyai-header text-primary"><i class="bi bi-person-plus me-2"></i>SteadyMind</h1>
                <p class="text-muted">Create an account to start tracking your progress.</p>
            </div>
            
            <div class="card steadyai-card shadow-sm">
                <div class="card-body p-4">
                    <!-- Note: This form is a mockup for demo/interview purposes -->
                    <form th:action="@{/login}" method="get">
                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">Full Name</label>
                            <input type="text" id="name" name="name" class="form-control" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email Address</label>
                            <input type="email" id="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <input type="password" id="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="bi bi-person-plus-fill me-1"></i> Create Account
                        </button>
                        <div class="text-center small">
                            <span class="text-muted">Already have an account?</span> 
                            <a th:href="@{/login}" class="text-primary text-decoration-none fw-semibold">Log In</a>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="text-center mt-4">
                <a th:href="@{/}" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left me-1"></i>Back to Home</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
