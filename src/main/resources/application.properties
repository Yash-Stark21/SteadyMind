spring.application.name=steady-ai

# Server configuration
server.port=${SERVER_PORT:8080}

# Stateless REST API JWT configuration
security.jwt.secret=${STEADYAI_JWT_SECRET:dev-only-change-me-please-set-a-strong-32-byte-secret}
security.jwt.access-token-ttl=15m
security.jwt.issuer=steadyai

# Runtime datasource configuration. Use the demo profile for a no-MySQL local run.
spring.datasource.url=${STEADYAI_DATASOURCE_URL:jdbc:mysql://localhost:3306/steadyai?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${STEADYAI_DATASOURCE_USERNAME:steadyai}
spring.datasource.password=${STEADYAI_DATASOURCE_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${STEADYAI_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${STEADYAI_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${STEADYAI_JPA_FORMAT_SQL:false}
