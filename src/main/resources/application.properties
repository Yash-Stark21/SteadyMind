spring.application.name=steady-ai

# Server configuration
server.port=8080

# --- MySQL Configuration (Commented out for local H2 development) ---
# spring.datasource.url=jdbc:mysql://localhost:3306/steadyai?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=adminStark@21
# spring.jpa.hibernate.ddl-auto=none

# H2 database
spring.datasource.url=jdbc:h2:mem:steadyai
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

spring.profiles.active=mock-ai

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
#statements are printed in the console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Spring AI configuration placeholder
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-placeholder}
