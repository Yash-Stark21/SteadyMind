spring.application.name=steady-ai

# Server configuration
server.port=8080

# Stateless REST API JWT configuration
security.jwt.secret=${STEADYAI_JWT_SECRET:dev-only-change-me-please-set-a-strong-32-byte-secret}
security.jwt.access-token-ttl=15m
security.jwt.issuer=steadyai

# --- MySQL Configuration ---
spring.datasource.url=jdbc:mysql://localhost:3306/steadyai?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Stark@SQL



spring.profiles.active=openAI

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
#statements are printed in the console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true



# Spring AI configuration
