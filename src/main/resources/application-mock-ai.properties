# ============================================================================
# Mock AI Profile Configuration
# ============================================================================
# When this profile is active, MockAiClient provides deterministic responses
# without requiring an OpenAI API key or any network connectivity.
#
# Activated by: spring.profiles.active=mock-ai (in application.properties)
# ============================================================================

# Override the OpenAI API key requirement — no real AI calls are made
spring.ai.openai.api-key=mock-ai-no-key-required
