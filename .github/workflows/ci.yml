name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
      - openai
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Maven Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run tests
        run: bash ./mvnw -B test
